[build]
  command = "npm run build && mkdir -p .netlify/static/_nuxt && cp -r .nuxt/dist/client/_nuxt/. .netlify/static/_nuxt/ && cp -r public/. .netlify/static/"
  publish = ".netlify/static"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
