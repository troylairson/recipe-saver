[build]
  command = "npm run build && echo '=== .output/public ===' && find .output/public -maxdepth 2 2>&1 | head -20 && echo '=== .netlify/static ===' && find .netlify/static -maxdepth 2 2>&1 | head -20 && mkdir -p .netlify/static"
  publish = ".netlify/static"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
